<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DALGA — Haber Akışı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════ */
:root {
  --bg:         #040d14;
  --surface:    #07161f;
  --card:       #091e2b;
  --card-h:     #0c2537;
  --border:     #0e2d3d;
  --border-h:   #134055;
  --teal:       #0dd4be;
  --teal-b:     #07b09d;
  --teal-dim:   rgba(13,212,190,.12);
  --teal-glow:  rgba(13,212,190,.2);
  --teal-soft:  rgba(13,212,190,.06);
  --text:       #d8f0ee;
  --text-dim:   #7cb8b2;
  --muted:      #3d7a75;
  --c-tr:       #06d6a0;
  --c-du:       #0dd4be;
  --c-te:       #22d3ee;
  --c-bi:       #67e8f9;
  --c-sp:       #a5f3fc;
  --r:          9px;
  --r-lg:       14px;
  --font-head:  'Syne', sans-serif;
  --font-body:  'Outfit', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }

/* ═══════════════════════════════════════════════
   ANIMATED NOISE OVERLAY
═══════════════════════════════════════════════ */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: .6;
}

/* ═══════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════ */
header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px;
  height: 58px;
  background: rgba(4,13,20,.88);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-head);
  font-size: 19px; font-weight: 800;
  letter-spacing: -.5px;
  color: var(--text);
}
.logo-mark svg { flex-shrink: 0; }
.logo-mark .wave-path { stroke-dasharray: 80; stroke-dashoffset: 80; animation: wave-draw 1.2s .2s cubic-bezier(.4,0,.2,1) forwards; }
@keyframes wave-draw { to { stroke-dashoffset: 0; } }
.logo-dot { color: var(--teal); margin-left: 1px; }

.header-right { display: flex; align-items: center; gap: 10px; }

.lang-sw {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.lang-sw button {
  padding: 5px 11px;
  font-size: 11.5px;
  font-weight: 600;
  font-family: var(--font-head);
  letter-spacing: .5px;
  border: none;
  background: transparent;
  color: var(--muted);
  transition: all .2s;
}
.lang-sw button.on { background: var(--teal); color: #040d14; }

.live-badge {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  background: var(--teal-soft);
  border: 1px solid rgba(13,212,190,.2);
  border-radius: 20px;
  font-size: 11px; font-weight: 500;
  color: var(--teal);
}
.live-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--teal);
  animation: lpulse 2s infinite;
}
@keyframes lpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.7)} }

/* ═══════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════ */
.hero {
  position: relative;
  padding: 68px 28px 52px;
  text-align: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 50% -10%, rgba(13,212,190,.13) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(6,182,212,.07) 0%, transparent 60%),
    radial-gradient(ellipse 30% 40% at 20% 90%, rgba(13,212,190,.05) 0%, transparent 60%);
  pointer-events: none;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(13,212,190,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(13,212,190,.04) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 0%, transparent 80%);
  pointer-events: none;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 14px;
  border: 1px solid rgba(13,212,190,.25);
  border-radius: 20px;
  font-size: 11.5px; font-weight: 500;
  color: var(--teal);
  background: var(--teal-soft);
  margin-bottom: 22px;
  letter-spacing: .3px;
  animation: fadeUp .6s ease both;
}
.hero h1 {
  font-family: var(--font-head);
  font-size: clamp(32px, 6vw, 58px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.05;
  color: var(--text);
  margin-bottom: 14px;
  animation: fadeUp .6s .1s ease both;
}
.hero h1 em {
  font-style: normal;
  background: linear-gradient(135deg, var(--teal) 0%, #22d3ee 50%, #6ee7f7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub {
  font-size: 15px; font-weight: 400;
  color: var(--text-dim);
  margin-bottom: 36px;
  letter-spacing: -.1px;
  animation: fadeUp .6s .18s ease both;
}

/* ── SEARCH BAR ── */
.search-wrap {
  position: relative;
  max-width: 620px;
  margin: 0 auto;
  animation: fadeUp .6s .26s ease both;
}
.search-icon {
  position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
  color: var(--muted);
  pointer-events: none;
  transition: color .25s;
  z-index: 2;
}
.search-wrap:focus-within .search-icon { color: var(--teal); }
.search-input {
  width: 100%;
  padding: 16px 54px 16px 52px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color .25s, box-shadow .25s, background .25s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus {
  border-color: var(--teal);
  background: #0a1f2c;
  box-shadow: 0 0 0 4px rgba(13,212,190,.08), 0 8px 32px rgba(0,0,0,.4);
}
.search-btn {
  position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
  padding: 9px 20px;
  background: var(--teal);
  border: none;
  border-radius: 40px;
  font-family: var(--font-head);
  font-size: 13px; font-weight: 700;
  color: #04100e;
  letter-spacing: .3px;
  transition: background .2s, transform .15s;
  z-index: 2;
}
.search-btn:hover { background: #0fc9b4; transform: translateY(-50%) scale(1.04); }
.search-clear {
  position: absolute; right: 100px; top: 50%; transform: translateY(-50%);
  background: transparent; border: none;
  color: var(--muted);
  font-size: 18px; line-height: 1;
  padding: 4px;
  display: none;
  z-index: 2;
}
.search-clear:hover { color: var(--text); }
.search-clear.visible { display: block; }

/* Stats bar */
.stats-bar {
  display: flex; align-items: center; justify-content: center;
  gap: 20px;
  margin-top: 28px;
  animation: fadeUp .6s .34s ease both;
}
.stat { text-align: center; }
.stat-val {
  font-family: var(--font-head);
  font-size: 20px; font-weight: 700;
  color: var(--teal);
}
.stat-lbl {
  font-size: 11px; color: var(--muted); margin-top: 2px;
  letter-spacing: .3px; text-transform: uppercase;
}
.stat-div { width: 1px; height: 32px; background: var(--border); }

/* ═══════════════════════════════════════════════
   CATEGORY BAR
═══════════════════════════════════════════════ */
.cat-bar {
  position: sticky; top: 58px; z-index: 90;
  background: rgba(4,13,20,.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
}
.cat-inner {
  display: flex; gap: 4px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 10px 0;
  max-width: 1200px; margin: 0 auto;
}
.cat-inner::-webkit-scrollbar { display: none; }
.cat-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px;
  border-radius: 40px;
  font-family: var(--font-body);
  font-size: 13px; font-weight: 500;
  white-space: nowrap;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  transition: all .2s;
  flex-shrink: 0;
}
.cat-pill:hover:not(.on) { border-color: var(--border-h); color: var(--text); }
.cat-pill.on {
  background: var(--teal-dim);
  border-color: rgba(13,212,190,.45);
  color: var(--teal);
  font-weight: 600;
}
.cat-pill .cnt {
  font-size: 10.5px; font-weight: 600;
  background: var(--surface);
  padding: 1px 6px; border-radius: 10px;
  color: var(--muted);
  transition: inherit;
}
.cat-pill.on .cnt { background: rgba(13,212,190,.15); color: var(--teal); }

/* ═══════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════ */
.main-wrap {
  max-width: 1200px;
  margin: 0 auto;
  padding: 28px 28px 60px;
}

/* Results header */
.results-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 22px;
}
.results-info {
  font-size: 13px; color: var(--muted);
}
.results-info strong { color: var(--teal); font-weight: 600; }
.sort-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 12.5px; color: var(--text-dim);
  transition: all .2s;
}
.sort-btn:hover { border-color: var(--border-h); color: var(--text); }

/* ═══════════════════════════════════════════════
   NEWS GRID
═══════════════════════════════════════════════ */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* ── CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color .25s, background .25s, transform .25s, box-shadow .25s;
  cursor: pointer;
  animation: cardIn .45s ease both;
  position: relative;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 3px; height: 100%;
  background: var(--c-color, var(--teal));
  border-radius: var(--r-lg) 0 0 var(--r-lg);
  opacity: .5;
  transition: opacity .25s;
}
.card:hover {
  border-color: var(--border-h);
  background: var(--card-h);
  transform: translateY(-3px);
  box-shadow: 0 16px 48px rgba(0,0,0,.35), 0 0 0 1px rgba(13,212,190,.06);
}
.card:hover::before { opacity: 1; }

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-header {
  padding: 16px 16px 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.badges { display: flex; align-items: center; gap: 6px; }
.badge-cat {
  font-size: 10px; font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--c-bg, rgba(13,212,190,.1));
  color: var(--c-color, var(--teal));
  font-family: var(--font-head);
}
.badge-src {
  font-size: 10px; font-weight: 500;
  padding: 3px 8px;
  border-radius: 4px;
  background: rgba(255,255,255,.04);
  color: var(--muted);
  border: 1px solid var(--border);
}
.card-age {
  font-size: 11px; color: var(--muted);
  white-space: nowrap;
}

.card-body { padding: 2px 16px 16px; flex: 1; display: flex; flex-direction: column; }
.card-title {
  font-family: var(--font-head);
  font-size: 15.5px; font-weight: 700;
  line-height: 1.4;
  letter-spacing: -.2px;
  color: var(--text);
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-desc {
  font-size: 13px; font-weight: 400;
  color: var(--text-dim);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.card-footer {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.read-btn {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  color: var(--teal);
  font-family: var(--font-head);
  letter-spacing: .2px;
  background: transparent; border: none;
  padding: 0;
  transition: gap .2s, opacity .2s;
}
.read-btn svg { transition: transform .2s; }
.card:hover .read-btn svg { transform: translateX(3px); }

/* ── SKELETON ── */
.skeleton {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
  padding: 20px;
}
.skel-line {
  border-radius: 6px;
  background: linear-gradient(90deg, var(--surface) 25%, var(--card-h) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  margin-bottom: 10px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.skel-h  { height: 12px; width: 40%; }
.skel-t1 { height: 18px; width: 90%; margin-top: 12px; }
.skel-t2 { height: 18px; width: 70%; }
.skel-d  { height: 13px; width: 100%; margin-top: 8px; }
.skel-d2 { height: 13px; width: 85%; }

/* ── EMPTY / ERROR ── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
}
.empty-icon { font-size: 52px; margin-bottom: 16px; opacity: .6; }
.empty-title {
  font-family: var(--font-head);
  font-size: 18px; font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}
.empty-sub { font-size: 14px; color: var(--muted); }
.retry-btn {
  margin-top: 20px;
  padding: 10px 24px;
  background: var(--teal-dim);
  border: 1px solid rgba(13,212,190,.3);
  border-radius: 8px;
  font-size: 13px; font-weight: 600;
  color: var(--teal);
  transition: all .2s;
}
.retry-btn:hover { background: rgba(13,212,190,.2); }

/* ── SEARCH RESULTS HIGHLIGHT ── */
mark {
  background: rgba(13,212,190,.22);
  color: var(--teal);
  border-radius: 2px;
  padding: 0 2px;
}

/* ═══════════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════════ */
footer {
  border-top: 1px solid var(--border);
  padding: 24px 28px;
  text-align: center;
}
.footer-inner {
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  font-size: 12.5px; color: var(--muted);
}
.footer-logo { font-family: var(--font-head); font-weight: 700; color: var(--teal); }

/* ═══════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ═══════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════ */
@media (max-width: 640px) {
  header { padding: 0 16px; }
  .hero  { padding: 44px 16px 36px; }
  .cat-bar, .main-wrap { padding-left: 16px; padding-right: 16px; }
  .hero h1 { letter-spacing: -1px; }
  .grid { grid-template-columns: 1fr; }
  .stats-bar { gap: 12px; }
  .stat-val { font-size: 17px; }
  .live-badge span { display: none; }
}
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="logo-mark">
    <svg width="28" height="16" viewBox="0 0 56 28" fill="none">
      <path class="wave-path"
        d="M2 14 Q8 2 14 14 Q20 26 26 14 Q32 2 38 14 Q44 26 50 14 Q53 8 55 14"
        stroke="url(#wg)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="56" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#06d6a0"/>
          <stop offset="100%" stop-color="#22d3ee"/>
        </linearGradient>
      </defs>
    </svg>
    DALGA<span class="logo-dot">.</span>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-pulse"></div>
      <span id="live-lbl">Canlı</span>
    </div>
    <div class="lang-sw">
      <button id="btn-tr" class="on" onclick="setLang('tr')">TR</button>
      <button id="btn-en"           onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-eyebrow">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    <span id="ey-lbl">Yapay zeka desteksiz · Tamamen ücretsiz · RSS tabanlı</span>
  </div>
  <h1 id="hero-h1">Haberlerin <em>Dalgasında</em> Kal</h1>
  <p class="hero-sub" id="hero-sub">Türkiye ve dünyadan güncel haberleri tek akışta takip et</p>

  <div class="search-wrap">
    <div class="search-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <input class="search-input" id="search-inp" type="text"
      placeholder="Haber ara… (örn: ekonomi, deprem, yapay zeka)"
      oninput="onSearch()" onkeydown="onSearchKey(event)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
    <button class="search-btn" id="search-btn-lbl" onclick="doSearch()">Ara</button>
  </div>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="st-total">—</div>
      <div class="stat-lbl" id="st-total-l">Haber</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-val" id="st-src">10</div>
      <div class="stat-lbl" id="st-src-l">Kaynak</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-val" id="st-cat">5</div>
      <div class="stat-lbl" id="st-cat-l">Kategori</div>
    </div>
    <div class="stat-div"></div>
    <div class="stat">
      <div class="stat-val" id="st-upd">—</div>
      <div class="stat-lbl" id="st-upd-l">Güncelleme</div>
    </div>
  </div>
</section>

<!-- ═══ CATEGORY BAR ═══ -->
<div class="cat-bar">
  <div class="cat-inner" id="cat-inner">
    <button class="cat-pill on" data-cat="all" onclick="setCat(this)">
      <span>🔵</span> <span id="c-all">Tümü</span>
      <span class="cnt" id="cnt-all">0</span>
    </button>
    <button class="cat-pill" data-cat="turkiye" onclick="setCat(this)" style="--c-color:var(--c-tr)">
      <span>🇹🇷</span> <span id="c-tr">Türkiye</span>
      <span class="cnt" id="cnt-turkiye">0</span>
    </button>
    <button class="cat-pill" data-cat="dunya" onclick="setCat(this)" style="--c-color:var(--c-du)">
      <span>🌍</span> <span id="c-du">Dünya</span>
      <span class="cnt" id="cnt-dunya">0</span>
    </button>
    <button class="cat-pill" data-cat="teknoloji" onclick="setCat(this)" style="--c-color:var(--c-te)">
      <span>💻</span> <span id="c-te">Teknoloji</span>
      <span class="cnt" id="cnt-teknoloji">0</span>
    </button>
    <button class="cat-pill" data-cat="bilim" onclick="setCat(this)" style="--c-color:var(--c-bi)">
      <span>🔬</span> <span id="c-bi">Bilim</span>
      <span class="cnt" id="cnt-bilim">0</span>
    </button>
    <button class="cat-pill" data-cat="spor" onclick="setCat(this)" style="--c-color:var(--c-sp)">
      <span>⚽</span> <span id="c-sp">Spor</span>
      <span class="cnt" id="cnt-spor">0</span>
    </button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main-wrap">
  <div class="results-head">
    <div class="results-info" id="results-info"></div>
    <button class="sort-btn" id="sort-toggle" onclick="toggleSort()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M7 12h10M11 18h2"/></svg>
      <span id="sort-lbl">En Yeni</span>
    </button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- ═══ FOOTER ═══ -->
<footer>
  <div class="footer-inner">
    <span>©</span>
    <span class="footer-logo">DALGA</span>
    <span>·</span>
    <span id="f-free">Tamamen ücretsiz</span>
    <span>·</span>
    <span id="f-pow">RSS & rss2json.com ile çalışır</span>
  </div>
</footer>

<script>
/* ═══════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════ */
const FEEDS = {
  turkiye: [
    { url:'https://www.hurriyet.com.tr/rss/gundem',                            name:'Hürriyet'   },
    { url:'https://www.ntv.com.tr/gundem.rss',                                 name:'NTV'        },
    { url:'https://www.milliyet.com.tr/rss/rssNew/gundemRss.xml',              name:'Milliyet'   },
    { url:'https://www.sabah.com.tr/rss/gundem.xml',                           name:'Sabah'      },
  ],
  dunya: [
    { url:'https://feeds.bbci.co.uk/turkish/rss.xml',                          name:'BBC Türkçe' },
    { url:'https://tr.euronews.com/rss',                                        name:'Euronews'   },
    { url:'https://www.dw.com/tr/medya-merkezi/habervideo/s-60218/rss',         name:'DW Türkçe'  },
  ],
  teknoloji: [
    { url:'https://www.webtekno.com/rss.xml',                                   name:'Webtekno'   },
    { url:'https://shiftdelete.net/feed',                                       name:'ShiftDelete' },
    { url:'https://techcrunch.com/feed/',                                       name:'TechCrunch'  },
  ],
  bilim: [
    { url:'https://bilimfili.com/feed/',                                        name:'BilimFili'  },
    { url:'https://feeds.bbci.co.uk/news/science_and_environment/rss.xml',     name:'BBC Science' },
    { url:'https://www.sciencedaily.com/rss/all.xml',                           name:'ScienceDaily'},
  ],
  spor: [
    { url:'https://www.ntvspor.net/rss',                                        name:'NTV Spor'   },
    { url:'https://www.fanatik.com.tr/rss/rss.xml',                             name:'Fanatik'    },
    { url:'https://feeds.bbci.co.uk/sport/rss.xml',                            name:'BBC Sport'   },
  ],
};

const CAT_META = {
  turkiye:   { color:'var(--c-tr)', bg:'rgba(6,214,160,.1)',   label:{tr:'Türkiye',   en:'Turkey'} },
  dunya:     { color:'var(--c-du)', bg:'rgba(13,212,190,.1)',  label:{tr:'Dünya',     en:'World'}  },
  teknoloji: { color:'var(--c-te)', bg:'rgba(34,211,238,.1)',  label:{tr:'Teknoloji', en:'Tech'}   },
  bilim:     { color:'var(--c-bi)', bg:'rgba(103,232,249,.1)', label:{tr:'Bilim',     en:'Science'} },
  spor:      { color:'var(--c-sp)', bg:'rgba(165,243,252,.1)', label:{tr:'Spor',      en:'Sports'} },
};

const I18N = {
  tr:{
    title:'Haberlerin Dalgasında Kal', sub:'Türkiye ve dünyadan güncel haberleri tek akışta takip et',
    eyebrow:'Yapay zeka desteksiz · Tamamen ücretsiz · RSS tabanlı',
    all:'Tümü', live:'Canlı', newsLbl:'Haber', srcLbl:'Kaynak', catLbl:'Kategori', updLbl:'Güncelleme',
    pholder:'Haber ara… (örn: ekonomi, deprem, yapay zeka)',
    search:'Ara', newest:'En Yeni', relevance:'İlgili',
    readMore:'Devamını Oku', sources:'Kaynaklar',
    results:(n,q)=> q ? `"${q}" için <strong>${n}</strong> sonuç` : `<strong>${n}</strong> haber bulundu`,
    empty:'Haber bulunamadı', emptySub:'Farklı bir arama deneyin veya kategori seçin',
    retry:'Yeniden Dene', loading:'Yükleniyor…',
    error:'Bağlantı hatası', errorSub:'Haberler yüklenemedi. İnternet bağlantınızı kontrol edin.',
    free:'Tamamen ücretsiz', pow:'RSS & rss2json.com ile çalışır',
    ago:{ now:'Az önce', m:'dk önce', h:'sa önce', d:'gün önce' },
  },
  en:{
    title:'Ride the Wave of News', sub:'Follow latest news from Turkey and the world in one feed',
    eyebrow:'No AI required · Completely free · RSS-powered',
    all:'All', live:'Live', newsLbl:'News', srcLbl:'Sources', catLbl:'Categories', updLbl:'Updated',
    pholder:'Search news… (e.g. economy, AI, sports)',
    search:'Search', newest:'Newest', relevance:'Relevant',
    readMore:'Read More', sources:'Sources',
    results:(n,q)=> q ? `<strong>${n}</strong> results for "${q}"` : `<strong>${n}</strong> articles`,
    empty:'No news found', emptySub:'Try a different search or select another category',
    retry:'Retry', loading:'Loading…',
    error:'Connection error', errorSub:'Could not load news. Check your internet connection.',
    free:'Completely free', pow:'Powered by RSS & rss2json.com',
    ago:{ now:'Just now', m:'m ago', h:'h ago', d:'d ago' },
  },
};

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let lang       = 'tr';
let allItems   = [];
let activeCat  = 'all';
let searchQ    = '';
let sortMode   = 'date';   // 'date' | 'relevance'
let loadedAt   = null;
let loadError  = false;

/* ═══════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════ */
async function fetchFeed(feed, cat) {
  try {
    const url = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}&count=12`;
    const r = await fetch(url, { signal: AbortSignal.timeout(9000) });
    if (!r.ok) return [];
    const d = await r.json();
    if (d.status !== 'ok' && d.status !== 'ok ') return [];
    return (d.items || []).map(it => ({
      id:    Math.random().toString(36).slice(2),
      cat,
      src:   feed.name,
      title: clean(it.title || ''),
      desc:  clean((it.description || it.content || '').replace(/<[^>]*>/g,'').replace(/\s+/g,' ').slice(0,240)),
      link:  it.link || it.guid || '#',
      date:  new Date(it.pubDate || 0),
    }));
  } catch { return []; }
}

function clean(s){ return s.replace(/&#(\d+);/g,(_,c)=>String.fromCharCode(c)).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').trim(); }

async function loadAll() {
  loadError = false;
  renderSkeletons(18);
  const tasks = [];
  for(const [cat, feeds] of Object.entries(FEEDS))
    for(const feed of feeds) tasks.push(fetchFeed(feed, cat));
  const results = await Promise.allSettled(tasks);
  let raw = [];
  for(const r of results) if(r.status==='fulfilled') raw = raw.concat(r.value);

  // deduplicate by normalised title
  const seen = new Set();
  allItems = [];
  for(const it of raw){
    const k = it.title.toLowerCase().slice(0,50).replace(/\s+/g,'');
    if(k && !seen.has(k)){ seen.add(k); allItems.push(it); }
  }
  // sort newest first by default
  allItems.sort((a,b)=> b.date - a.date);
  loadedAt = new Date();
  updateStats();
  renderCards();
}

/* ═══════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════ */
function filtered(){
  let items = activeCat==='all' ? [...allItems] : allItems.filter(i=>i.cat===activeCat);
  if(searchQ){
    const q = searchQ.toLowerCase();
    items = items.filter(i=> i.title.toLowerCase().includes(q) || i.desc.toLowerCase().includes(q));
    if(sortMode==='relevance'){
      items.sort((a,b)=>{
        const sc = i=> (i.title.toLowerCase().split(q).length - 1)*2 + (i.desc.toLowerCase().split(q).length - 1);
        return sc(b)-sc(a);
      });
    }
  }
  return items;
}

function highlight(text, q){
  if(!q) return escHtml(text);
  const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'));
  return parts.map(p=> p.toLowerCase()===q.toLowerCase() ? `<mark>${escHtml(p)}</mark>` : escHtml(p)).join('');
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function timeAgo(d){
  if(!d||isNaN(d)) return '';
  const diff = Math.floor((Date.now()-d)/1000);
  const t = I18N[lang].ago;
  if(diff<90) return t.now;
  if(diff<3600) return Math.floor(diff/60)+' '+t.m;
  if(diff<86400) return Math.floor(diff/3600)+' '+t.h;
  return Math.floor(diff/86400)+' '+t.d;
}

function renderSkeletons(n){
  const g = document.getElementById('grid');
  g.innerHTML = Array(n).fill(0).map(()=>`
    <div class="skeleton">
      <div class="skel-line skel-h"></div>
      <div class="skel-line skel-t1"></div>
      <div class="skel-line skel-t2"></div>
      <div class="skel-line skel-d" style="margin-top:14px"></div>
      <div class="skel-line skel-d2"></div>
    </div>`).join('');
}

function renderCards(){
  const t = I18N[lang];
  const items = filtered();
  const g = document.getElementById('grid');

  // update counts for categories
  const catCounts = {};
  for(const it of allItems) catCounts[it.cat] = (catCounts[it.cat]||0)+1;
  document.getElementById('cnt-all').textContent       = allItems.length;
  for(const cat of Object.keys(FEEDS)){
    const el = document.getElementById('cnt-'+cat);
    if(el) el.textContent = catCounts[cat]||0;
  }

  // results info
  document.getElementById('results-info').innerHTML = t.results(items.length, searchQ);

  if(items.length===0){
    const msg = loadError ? `<div class="empty-state">
      <div class="empty-icon">📡</div>
      <div class="empty-title">${t.error}</div>
      <p class="empty-sub">${t.errorSub}</p>
      <button class="retry-btn" onclick="loadAll()">${t.retry}</button>
    </div>` : `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-title">${t.empty}</div>
      <p class="empty-sub">${t.emptySub}</p>
    </div>`;
    g.innerHTML = msg; return;
  }

  const q = searchQ.toLowerCase();
  g.innerHTML = items.map((it,idx)=>{
    const m = CAT_META[it.cat]||CAT_META.dunya;
    const catLbl = m.label[lang];
    const delay  = Math.min(idx*0.04, 0.5);
    return `
    <div class="card" style="--c-color:${m.color};--c-bg:${m.bg};animation-delay:${delay}s"
         onclick="window.open('${it.link}','_blank','noopener')">
      <div class="card-header">
        <div class="badges">
          <span class="badge-cat">${catLbl}</span>
          <span class="badge-src">${escHtml(it.src)}</span>
        </div>
        <span class="card-age">${timeAgo(it.date)}</span>
      </div>
      <div class="card-body">
        <div class="card-title">${highlight(it.title,q)}</div>
        ${it.desc ? `<div class="card-desc">${highlight(it.desc,q)}</div>` : ''}
      </div>
      <div class="card-footer">
        <button class="read-btn" onclick="event.stopPropagation();window.open('${it.link}','_blank','noopener')">
          ${t.readMore}
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <span style="font-size:10px;color:var(--muted)">${it.date.toLocaleDateString(lang==='tr'?'tr-TR':'en-US',{month:'short',day:'numeric'})}</span>
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  document.getElementById('st-total').textContent = allItems.length;
  if(loadedAt){
    const hh = loadedAt.getHours().toString().padStart(2,'0');
    const mm = loadedAt.getMinutes().toString().padStart(2,'0');
    document.getElementById('st-upd').textContent = `${hh}:${mm}`;
  }
}

/* ═══════════════════════════════════════════════
   INTERACTIONS
═══════════════════════════════════════════════ */
function setCat(btn){
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('on'));
  btn.classList.add('on');
  activeCat = btn.dataset.cat;
  renderCards();
}

function onSearch(){
  const v = document.getElementById('search-inp').value.trim();
  searchQ = v;
  document.getElementById('search-clear').classList.toggle('visible', v.length>0);
}

function onSearchKey(e){ if(e.key==='Enter') doSearch(); }

function doSearch(){
  searchQ = document.getElementById('search-inp').value.trim();
  sortMode = searchQ ? 'relevance' : 'date';
  document.getElementById('sort-lbl').textContent = I18N[lang][sortMode==='relevance'?'relevance':'newest'];
  renderCards();
}

function clearSearch(){
  document.getElementById('search-inp').value = '';
  searchQ = ''; sortMode = 'date';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('sort-lbl').textContent = I18N[lang].newest;
  renderCards();
}

function toggleSort(){
  if(sortMode==='date'){ sortMode='relevance'; }
  else { sortMode='date'; allItems.sort((a,b)=>b.date-a.date); }
  document.getElementById('sort-lbl').textContent = I18N[lang][sortMode==='relevance'?'relevance':'newest'];
  renderCards();
}

/* ═══════════════════════════════════════════════
   I18N
═══════════════════════════════════════════════ */
function setLang(l){
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-tr').classList.toggle('on', l==='tr');
  document.getElementById('btn-en').classList.toggle('on', l==='en');
  const t = I18N[l];
  document.getElementById('hero-h1').innerHTML = l==='tr'
    ? 'Haberlerin <em>Dalgasında</em> Kal'
    : 'Ride the <em>Wave</em> of News';
  document.getElementById('hero-sub').textContent  = t.sub;
  document.getElementById('ey-lbl').textContent    = t.eyebrow;
  document.getElementById('live-lbl').textContent  = t.live;
  document.getElementById('search-inp').placeholder= t.pholder;
  document.getElementById('search-btn-lbl').textContent = t.search;
  document.getElementById('st-total-l').textContent = t.newsLbl;
  document.getElementById('st-src-l').textContent   = t.srcLbl;
  document.getElementById('st-cat-l').textContent   = t.catLbl;
  document.getElementById('st-upd-l').textContent   = t.updLbl;
  document.getElementById('c-all').textContent      = t.all;
  document.getElementById('c-tr').textContent       = 'Türkiye';
  document.getElementById('c-du').textContent       = l==='tr'?'Dünya':'World';
  document.getElementById('c-te').textContent       = l==='tr'?'Teknoloji':'Tech';
  document.getElementById('c-bi').textContent       = l==='tr'?'Bilim':'Science';
  document.getElementById('c-sp').textContent       = l==='tr'?'Spor':'Sports';
  document.getElementById('sort-lbl').textContent   = t[sortMode==='relevance'?'relevance':'newest'];
  document.getElementById('f-free').textContent     = t.free;
  document.getElementById('f-pow').textContent      = t.pow;
  renderCards();
}

/* ═══════════════════════════════════════════════
   INIT + AUTO-REFRESH (5 min)
═══════════════════════════════════════════════ */
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
