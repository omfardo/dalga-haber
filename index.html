<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

<title>DALGA — Haber Akışı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040d14;--surface:#07161f;--card:#091e2b;--card-h:#0c2537;
  --border:#0e2d3d;--border-h:#134055;
  --teal:#0dd4be;--teal-dim:rgba(13,212,190,.12);--teal-soft:rgba(13,212,190,.06);
  --text:#d8f0ee;--text-dim:#7cb8b2;--muted:#3d7a75;
  --c-tr:#06d6a0;--c-du:#0dd4be;--c-te:#22d3ee;--c-bi:#67e8f9;--c-sp:#a5f3fc;
  --fh:'Syne',sans-serif;--fb:'Outfit',sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit}
/* noise */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
/* header */
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:rgba(4,13,20,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--fh);font-size:18px;font-weight:800;letter-spacing:-.5px}.logo-dot{color:var(--teal)}
.logo svg .wp{stroke-dasharray:80;stroke-dashoffset:80;animation:wd 1.2s .3s ease forwards}
@keyframes wd{to{stroke-dashoffset:0}}
.hdr{display:flex;align-items:center;gap:8px}
.live-b{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--teal-soft);border:1px solid rgba(13,212,190,.2);border-radius:20px;font-size:11px;color:var(--teal)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:lp 2s infinite}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.25}}
.lang-sw{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang-sw button{padding:5px 11px;font-size:11.5px;font-weight:600;font-family:var(--fh);letter-spacing:.5px;border:none;background:transparent;color:var(--muted);transition:all .2s}
.lang-sw button.on{background:var(--teal);color:#040d14}
/* hero */
.hero{position:relative;padding:60px 24px 46px;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% -5%,rgba(13,212,190,.14) 0%,transparent 70%),radial-gradient(ellipse 35% 30% at 80% 80%,rgba(6,182,212,.07) 0%,transparent 60%);pointer-events:none}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(13,212,190,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(13,212,190,.04) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black 0%,transparent 80%);pointer-events:none}
.eyebrow{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border:1px solid rgba(13,212,190,.25);border-radius:20px;font-size:11.5px;font-weight:500;color:var(--teal);background:var(--teal-soft);margin-bottom:20px;animation:fu .6s ease both}
.hero h1{font-family:var(--fh);font-size:clamp(28px,5.5vw,54px);font-weight:800;letter-spacing:-1.5px;line-height:1.06;margin-bottom:12px;animation:fu .6s .1s ease both}
.hero h1 em{font-style:normal;background:linear-gradient(135deg,var(--teal) 0%,#22d3ee 50%,#6ee7f7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:15px;color:var(--text-dim);margin-bottom:32px;animation:fu .6s .18s ease both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
/* search */
.sw{position:relative;max-width:600px;margin:0 auto;animation:fu .6s .26s ease both}
.si-ic{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;transition:color .2s;z-index:2}
.sw:focus-within .si-ic{color:var(--teal)}
#si{width:100%;padding:15px 130px 15px 50px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;font-family:var(--fb);font-size:14.5px;color:var(--text);outline:none;transition:border-color .25s,box-shadow .25s,background .25s}
#si::placeholder{color:var(--muted)}
#si:focus{border-color:var(--teal);background:#0a1f2c;box-shadow:0 0 0 4px rgba(13,212,190,.08),0 8px 32px rgba(0,0,0,.4)}
#sc{position:absolute;right:108px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--muted);font-size:18px;padding:4px;display:none;z-index:2}
#sc.v{display:block}#sc:hover{color:var(--text)}
#sb{position:absolute;right:6px;top:50%;transform:translateY(-50%);padding:9px 20px;background:var(--teal);border:none;border-radius:40px;font-family:var(--fh);font-size:13px;font-weight:700;color:#04100e;letter-spacing:.3px;transition:background .2s}
#sb:hover{background:#0fc9b4}
/* stats */
.stats-bar{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:26px;animation:fu .6s .34s ease both}
.stat{text-align:center}
.sv{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--teal)}
.sl{font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.3px;text-transform:uppercase}
.sdiv{width:1px;height:30px;background:var(--border)}
/* cats */
.cat-bar{position:sticky;top:56px;z-index:90;background:rgba(4,13,20,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px}
.cat-inner{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:9px 0;max-width:1200px;margin:0 auto}
.cat-inner::-webkit-scrollbar{display:none}
.cp{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:40px;font-size:13px;font-weight:500;white-space:nowrap;border:1.5px solid var(--border);background:transparent;color:var(--text-dim);transition:all .2s;flex-shrink:0}
.cp:hover:not(.on){border-color:var(--border-h);color:var(--text)}
.cp.on{background:var(--teal-dim);border-color:rgba(13,212,190,.45);color:var(--teal);font-weight:600}
.cnt{font-size:10px;font-weight:600;background:var(--surface);padding:1px 6px;border-radius:10px;color:var(--muted)}
.cp.on .cnt{background:rgba(13,212,190,.15);color:var(--teal)}
/* main */
.main{max-width:1200px;margin:0 auto;padding:24px 24px 60px}
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ri{font-size:13px;color:var(--muted)}.ri strong{color:var(--teal);font-weight:600}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .25s,background .25s,transform .2s,box-shadow .25s;cursor:pointer;animation:ci .4s ease both;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--cc,var(--teal));opacity:.4;transition:opacity .25s}
.card:hover{border-color:var(--border-h);background:var(--card-h);transform:translateY(-3px);box-shadow:0 14px 40px rgba(0,0,0,.35)}
.card:hover::before{opacity:1}
@keyframes ci{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ch{padding:14px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.badges{display:flex;align-items:center;gap:5px}
.bc{font-size:9.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;padding:3px 8px;border-radius:4px;font-family:var(--fh)}
.bs{font-size:9.5px;font-weight:500;padding:3px 7px;border-radius:4px;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.ca{font-size:10.5px;color:var(--muted);white-space:nowrap}
.cb{padding:2px 14px 14px;flex:1;display:flex;flex-direction:column}
.ct{font-family:var(--fh);font-size:15px;font-weight:700;line-height:1.4;letter-spacing:-.2px;color:var(--text);margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cd{font-size:12.5px;color:var(--text-dim);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.cf{padding:9px 14px 13px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.rb{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;color:var(--teal);font-family:var(--fh);background:transparent;border:none;padding:0}
.rb svg{transition:transform .2s}.card:hover .rb svg{transform:translateX(3px)}
/* skel */
.sk{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px}
.skl{border-radius:6px;background:linear-gradient(90deg,var(--surface) 25%,var(--card-h) 50%,var(--surface) 75%);background-size:200% 100%;animation:sh 1.5s infinite;margin-bottom:9px}
@keyframes sh{to{background-position:-200% 0}}
/* empty */
.empty{grid-column:1/-1;text-align:center;padding:70px 20px}
.ei{font-size:48px;margin-bottom:14px;opacity:.55}
.et{font-family:var(--fh);font-size:17px;font-weight:700;color:var(--text);margin-bottom:7px}
.es{font-size:13px;color:var(--muted)}
.rtry{margin-top:18px;padding:10px 22px;background:var(--teal-dim);border:1px solid rgba(13,212,190,.3);border-radius:8px;font-size:13px;font-weight:600;color:var(--teal);transition:all .2s}
.rtry:hover{background:rgba(13,212,190,.2)}
.warn{grid-column:1/-1;padding:12px 16px;background:rgba(13,212,190,.05);border:1px solid rgba(13,212,190,.2);border-radius:10px;font-size:12.5px;color:var(--text-dim)}
mark{background:rgba(13,212,190,.2);color:var(--teal);border-radius:2px;padding:0 2px}
footer{border-top:1px solid var(--border);padding:22px 24px;text-align:center}
.fi{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--muted)}
.fl{font-family:var(--fh);font-weight:700;color:var(--teal)}
@media(max-width:640px){header,.hero,.cat-bar,.main{padding-left:14px;padding-right:14px}.grid{grid-template-columns:1fr}}
</style>
</head>

const CM={
  turkiye:{cc:'#06d6a0',cbg:'rgba(6,214,160,.1)',tr:'Türkiye',en:'Turkey'},

};

let lang='tr',allItems=[],activeCat='all',searchQ='';

/* ── fetch: corsproxy.io → rss2json → allorigins (3 kademeli fallback) ── */
function tout(ms){return new Promise((_,rej)=>setTimeout(()=>rej(new Error('to')),ms))}

async function tryFetch(url, ms=12000){
  const r = await Promise.race([fetch(url, {mode:'cors'}), tout(ms)]);
  if(!r.ok) throw new Error('http '+r.status);
  return r;
}

async function fetchFeed(feed,cat){
  const enc = encodeURIComponent(feed.url);

  /* 1. corsproxy.io — raw XML */
  try{
    const r = await tryFetch(`https://corsproxy.io/?${enc}`, 12000);
    const xml = await r.text();
    const items = parseXML(xml, feed.name, cat);
    if(items.length) return {ok:true, items};
  }catch(e){}

  /* 2. rss2json.com — JSON */
  try{
    const r = await tryFetch(`https://api.rss2json.com/v1/api.json?rss_url=${enc}&count=15`, 12000);
    const d = await r.json();
    if((d.status==='ok'||d.status==='ok ')&&Array.isArray(d.items)&&d.items.length)
      return {ok:true, items:parseJ(d.items, feed.name, cat)};
  }catch(e){}

  /* 3. allorigins — raw XML */
  try{
    const r = await tryFetch(`https://api.allorigins.win/raw?url=${enc}`, 14000);
    const xml = await r.text();
    const items = parseXML(xml, feed.name, cat);
    if(items.length) return {ok:true, items};
  }catch(e){}

  return {ok:false, items:[]};
}

function parseJ(items,src,cat){
  return items.map(it=>({
    id:Math.random().toString(36).slice(2),cat,src,
    title:cl(it.title||''),
    desc:cl((it.description||it.content||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()).slice(0,240),
    link:it.link||it.guid||'#',
    date:new Date(it.pubDate||0)
  })).filter(i=>i.title.length>2);
}

function parseXML(xml,src,cat){
  try{
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    return[...doc.querySelectorAll('item')].slice(0,15).map(el=>({
      id:Math.random().toString(36).slice(2),cat,src,
      title:cl(el.querySelector('title')?.textContent||''),
      desc:cl((el.querySelector('description')?.textContent||'').replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim()).slice(0,240),
      link:el.querySelector('link')?.textContent||el.querySelector('guid')?.textContent||'#',
      date:new Date(el.querySelector('pubDate')?.textContent||0)
    })).filter(i=>i.title.length>2);
  }catch{return[]}
}

function cl(s){
  return s.replace(/&#(\d+);/g,(_,c)=>String.fromCharCode(+c))
    .replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>')
    .replace(/&quot;/g,'"').replace(/&apos;/g,"'").replace(/\s+/g,' ').trim();
}

async function loadAll(){
  skels(16);
  const tasks=[];
  for(const[cat,feeds]of Object.entries(FEEDS))
    for(const feed of feeds) tasks.push(fetchFeed(feed,cat).then(r=>({...r,cat,feed})));

  const settled=await Promise.allSettled(tasks);
  let raw=[],ok=0,fail=0;
  for(const s of settled){
    if(s.status==='fulfilled'){
      if(s.value.ok){ok++;raw=raw.concat(s.value.items);}
      else fail++;
    } else fail++;
  }

  const seen=new Set(); allItems=[];
  for(const it of raw){
    const k=it.title.toLowerCase().slice(0,55).replace(/\s+/g,'');
    if(k&&!seen.has(k)){seen.add(k);allItems.push(it);}
  }
  allItems.sort((a,b)=>b.date-a.date);

  document.getElementById('st0').textContent=allItems.length;
  const now=new Date();
  document.getElementById('st3').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  renderCards(ok,fail);
}

function skels(n){
  document.getElementById('grid').innerHTML=Array(n).fill(0).map(()=>`
    <div class="sk">
      <div class="skl" style="height:11px;width:38%"></div>
      <div class="skl" style="height:17px;width:88%;margin-top:10px"></div>
      <div class="skl" style="height:17px;width:65%"></div>
      <div class="skl" style="height:12px;width:100%;margin-top:10px"></div>
      <div class="skl" style="height:12px;width:80%"></div>
    </div>`).join('');
  document.getElementById('ri').innerHTML=`<span style="color:var(--muted)">${T[lang].loading}…</span>`;
}

function filtered(){
  let items=activeCat==='all'?[...allItems]:allItems.filter(i=>i.cat===activeCat);
  if(searchQ){
    const q=searchQ.toLowerCase();
    items=items.filter(i=>i.title.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q));
    items.sort((a,b)=>{
      const sc=i=>(i.title.toLowerCase().split(q).length-1)*2+(i.desc.toLowerCase().split(q).length-1);
      return sc(b)-sc(a);
    });
  }
  return items;
}

function hl(text,q){
  if(!q)return esc(text);
  const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function ago(d){
  if(!d||isNaN(d.getTime()))return'';
  const diff=Math.floor((Date.now()-d)/1000);
  const a=T[lang].ago;
  if(diff<120)return a.now;
  if(diff<3600)return Math.floor(diff/60)+' '+a.m;
  if(diff<86400)return Math.floor(diff/3600)+' '+a.h;
  return Math.floor(diff/86400)+' '+a.d;
}

function renderCards(ok=99,fail=0){
  const t=T[lang],g=document.getElementById('grid'),items=filtered();

  /* update counts */
  const cc={};for(const it of allItems)cc[it.cat]=(cc[it.cat]||0)+1;
  document.getElementById('cna').textContent=allItems.length;
  document.getElementById('cnt').textContent=cc.turkiye||0;
  document.getElementById('cnd').textContent=cc.dunya||0;
  document.getElementById('cnte').textContent=cc.teknoloji||0;
  document.getElementById('cnbi').textContent=cc.bilim||0;
  document.getElementById('cnsp').textContent=cc.spor||0;

  document.getElementById('ri').innerHTML=t.res(items.length,searchQ);

  if(allItems.length===0){
    g.innerHTML=`<div class="empty"><div class="ei">📡</div><div class="et">${t.errT}</div><p class="es">${t.errS}</p><button class="rtry" onclick="loadAll()">${t.retry}</button></div>`;
    return;
  }
  if(items.length===0){
    g.innerHTML=`<div class="empty"><div class="ei">🔍</div><div class="et">${t.empty}</div><p class="es">${t.emsub}</p></div>`;
    return;
  }

  const q=searchQ.toLowerCase();
  let html=fail>0?`<div class="warn" style="grid-column:1/-1">${t.warn(ok,fail,allItems.length)}</div>`:'';
  html+=items.map((it,i)=>{
    const m=CM[it.cat]||CM.dunya;
    const dl=Math.min(i*.035,.5);
    const ds=it.date&&!isNaN(it.date.getTime())?it.date.toLocaleDateString(lang==='tr'?'tr-TR':'en-US',{month:'short',day:'numeric'}):'';
    return`<div class="card" style="--cc:${m.cc};animation-delay:${dl}s" onclick="window.open('${esc(it.link)}','_blank','noopener')">
      <div class="ch">
        <div class="badges">
          <span class="bc" style="background:${m.cbg};color:${m.cc}">${m[lang]||m.tr}</span>
          <span class="bs">${esc(it.src)}</span>
        </div>
        <span class="ca">${ago(it.date)}</span>
      </div>
      <div class="cb">
        <div class="ct">${hl(it.title,q)}</div>
        ${it.desc?`<div class="cd">${hl(it.desc,q)}</div>`:''}
      </div>
      <div class="cf">
        <button class="rb" onclick="event.stopPropagation();window.open('${esc(it.link)}','_blank','noopener')">
          ${t.read}<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <span style="font-size:9.5px;color:var(--muted)">${ds}</span>
      </div>
    </div>`;
  }).join('');
  g.innerHTML=html;
}

function setCat(btn){document.querySelectorAll('.cp').forEach(p=>p.classList.remove('on'));btn.classList.add('on');activeCat=btn.dataset.cat;renderCards()}
function onSI(){
  const v=document.getElementById('si').value.trim();
  searchQ=v;
  document.getElementById('sc').classList.toggle('v',v.length>0);
  renderCards(); /* canlı arama — her tuşta çalışır */
}
function onSK(e){if(e.key==='Enter'){e.preventDefault();renderCards()}}
function doS(){searchQ=document.getElementById('si').value.trim();renderCards()}
function clrS(){
  document.getElementById('si').value='';
  searchQ='';
  document.getElementById('sc').classList.remove('v');
  document.getElementById('si').focus();
  renderCards();
}

function setLang(l){
  lang=l;document.documentElement.lang=l;
  document.getElementById('btr').classList.toggle('on',l==='tr');
  document.getElementById('ben').classList.toggle('on',l==='en');
  const t=T[l];
  document.getElementById('ll').textContent=t.live;
  document.getElementById('ey').textContent=t.ey;
  document.getElementById('hh').innerHTML=t.hh;
  document.getElementById('hs').textContent=t.hs;
  document.getElementById('si').placeholder=t.ph;
  document.getElementById('sb').textContent=t.sb;
  document.getElementById('ca').textContent=t.all;
  document.getElementById('sl0').textContent=t.sl0;
  document.getElementById('sl1').textContent=t.sl1;
  document.getElementById('sl2').textContent=t.sl2;
  document.getElementById('sl3').textContent=t.sl3;
  document.getElementById('ff').textContent=t.ff;
  document.getElementById('cdu').textContent=t.du;
  document.getElementById('cte').textContent=t.te;
  document.getElementById('cbi').textContent=t.bi;
  document.getElementById('csp').textContent=t.sp;
  renderCards();
}

loadAll();
setInterval(loadAll,5*60*1000);
</script>
